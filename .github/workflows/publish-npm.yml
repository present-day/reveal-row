name: Publish to npm

# Publishing the same version twice always fails. Run only when you tag a release
# (e.g. after merging a version bump: git tag vX.Y.Z && git push origin vX.Y.Z),
# or use "Run workflow" from the Actions tab (workflow_dispatch).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    # If your Trusted Publisher on npmjs.com has an "Environment" set, un-comment and set the
    # same name. If you leave the comment below out, the npm side must have Environment empty.
    # environment: <ENV_NAME>
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bun run test:coverage
      - run: bun run build

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm (OIDC)
        run: npm publish --provenance --access public
